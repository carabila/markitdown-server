services:
  markitdown-server:
    image: carabila/markitdown-server:latest
    container_name: markitdown
    ports:
      - 8101:8000
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./uploads:/app/uploads:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - frontend
networks:
  frontend:
    external: true